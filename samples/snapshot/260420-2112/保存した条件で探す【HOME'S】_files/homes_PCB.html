<!-- Callback to parent window to resize this IFRAME now that the ad count is known: -->
<script type="text/javascript">
    function sendParentResizeMessage(event, data, context) {
        if (context && context.parentElementId) {
            if (parent && parent.postMessage) {
                var message = 'method=updateAdSpace' + '&matchedAdCount=' + data.searchResult.spaces[0].ads.length + '&elementId=' + encodeURIComponent(context.parentElementId);
                var contentEl = document.getElementById(context.targetElementId);
                message = message + '&contentWidth=940&contentHeight=' + (contentEl.clientHeight || contentEl.offsetHeight);
                // It's safe to use '*' as targetOrigin here, because the message content is not secret.
                window.parent.postMessage(message, '*');
            }
        }
    }
    function gup( name )
    {
        name = name.replace(/[\[]/,"\\\[").replace(/[\]]/,"\\\]");
        var regexS = "[\\?&]"+name+"=([^&#]*)";
        var regex = new RegExp( regexS );
        var results = regex.exec( window.location.href );
        if( results == null )
             return "";
        else
             return results[1];
    }
</script>

<!-- Insert AdSpace -->

        targetElementId: 'adArea',
        forwardHashArgs: true,
        onImpressionResult: sendParentResizeMessage
