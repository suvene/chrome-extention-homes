/* = ui-frame
----------------------------------------------- */
.ui-frame-no-js {
	position: relative;
	border: 1px solid transparent;
	z-index: 0;
}
.ie7 .ui-frame-no-js {
	zoom: 1;
}
.ui-frame-core {
	position: absolute;
	top: -1px;
	left: -1px;
	right: -1px;
	bottom: -1px;
	display: block !important; /* js等でhideさせないため */
	border: 1px solid transparent;
	pointer-events: none;
	z-index: -1;
}
.ui-frame-item {
	position: absolute;
	display: none;
	background-repeat: no-repeat;
}
.ui-frame-top-left,
.ui-frame-top-center,
.ui-frame-top-right {
	top: -3px;
	height: 14px;
}
.ui-frame-middle-left,
.ui-frame-middle-center,
.ui-frame-middle-right {
	top: 11px;
	bottom: 9px;
	background-repeat: repeat-y;
}
.ui-frame-bottom-left,
.ui-frame-bottom-center,
.ui-frame-bottom-right {
	bottom: -5px;
	height: 14px;
}
.ui-frame-top-left,
.ui-frame-middle-left,
.ui-frame-bottom-left {
	left: -4px;
	width: 14px;
}
.ui-frame-top-center,
.ui-frame-middle-center,
.ui-frame-bottom-center {
	left: 10px;
	right: 10px;
}
.ui-frame-top-right,
.ui-frame-middle-right,
.ui-frame-bottom-right {
	right: -4px;
	width: 14px;
}
.ui-frame-top-left      { background-position: -28px   0; }
.ui-frame-top-center    { background-position: -42px   0; }
.ui-frame-top-right     { background-position: -28px -14px; }
.ui-frame-middle-left   { background-position:   0     0; }
.ui-frame-middle-center { background: none repeat; }
.ui-frame-middle-right  { background-position: -14px   0; }
.ui-frame-bottom-left   { background-position: -28px -28px; }
.ui-frame-bottom-center { background-position: -42px -28px; }
.ui-frame-bottom-right  { background-position: -28px -42px; }

    <!-- Callback to parent window to resize this IFRAME now that the ad count is known: -->
    <script type="text/javascript">
        function sendParentResizeMessage(event, data, context) {
            if (context && context.parentElementId) {
                if (parent && parent.postMessage) {
                    var message = 'method=updateAdSpace' + '&matchedAdCount=' + data.searchResult.spaces[0].ads.length + '&elementId=' + encodeURIComponent(context.parentElementId);
                    var contentEl = document.getElementById(context.targetElementId);
                    message = message + '&contentWidth=' + (contentEl.clientWidth || contentEl.offsetWidth) + '&contentHeight=' + (contentEl.clientHeight || contentEl.offsetHeight);
                    // It's safe to use '*' as targetOrigin here, because the message content is not secret.
                    window.parent.postMessage(message, '*');
                }
            }
        }
        function gup( name )
        {
            name = name.replace(/[\[]/,"\\\[").replace(/[\]]/,"\\\]");
            var regexS = "[\\?&]"+name+"=([^&#]*)";
            var regex = new RegExp( regexS );
            var results = regex.exec( window.location.href );
            if( results == null )
                 return "";
            else
                 return results[1];
        }
    </script>
